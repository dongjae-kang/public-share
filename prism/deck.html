// ============================================
// DECK CONTROLLER
// ============================================

function Deck() {
  const [current, setCurrent] = useState(0);

  const total = 11;

  const next = useCallback(() => setCurrent((c) => Math.min(c + 1, total - 1)), []);
  const prev = useCallback(() => setCurrent((c) => Math.max(c - 1, 0)), []);
  const goTo = useCallback((i) => setCurrent(i), []);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'PageDown') {
        e.preventDefault();
        next();
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        e.preventDefault();
        prev();
      } else if (e.key === 'Home') {
        e.preventDefault();
        setCurrent(0);
      } else if (e.key === 'End') {
        e.preventDefault();
        setCurrent(total - 1);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [next, prev]);

  const slides = [
    <SlideCover />,
    <Slide1 />,
    <Slide2 />,
    <Slide3 />,
    <Slide4 onPrev={prev} onNext={next} />,
    <Slide5Pentagon onPrev={prev} onNext={next} />,
    <Slide6Invitation />,
    <Slide7Meaning />,
    <Slide7Timeline />,
    <Slide8LongTerm />,
    <Slide9Contact />,
  ];

  return (
    <div style={{ position: 'fixed', inset: 0 }}>
      <div className="brand">PRISM · Provenance</div>
      <div className="counter tabular-nums">
        {pad2(current + 1)} <span className="text-slate-300"> / </span> {pad2(total)}
      </div>

      {slides.map((slide, i) => (
        <div key={i} className={`slide ${i === current ? 'active' : ''}`}>
          {slide}
        </div>
      ))}

      <div className="edge-zone left" onClick={prev} aria-label="Previous slide" />
      <div className="edge-zone right" onClick={next} aria-label="Next slide" />

      <div className="dots" role="tablist" aria-label="Slide navigation">
        {slides.map((_, i) => (
          <button
            key={i}
            className={`dot ${i === current ? 'active' : ''}`}
            onClick={() => goTo(i)}
            aria-label={`Go to slide ${i + 1}`}
          />
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Deck />);
</script>
