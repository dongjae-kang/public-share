// ============================================================
// HOME PAGE — 5개 카드 요약 + Hero + 검색
// ============================================================

function HomePage({ cards, setPage }) {
  const [query, setQuery] = useState("");
  const filtered = useMemo(() => {
    if (!query.trim()) return cards;
    const q = query.toLowerCase();
    return cards.filter((c) =>
      (c.title + " " + c.subtitle + " " + c.body + " " + (c.issue || "")).toLowerCase().includes(q)
    );
  }, [query, cards]);

  return (
    <div className="max-w-2xl mx-auto px-5 py-6">
      <HeroCard setPage={setPage} />

      <section className="mt-8">
        <div className="flex items-baseline justify-between mb-4">
          <h2 className="headline-display text-[20px] md:text-[22px]">오늘 따라가는 이야기</h2>
          <button
            onClick={() => setPage("today")}
            className="mono text-[10.5px] uppercase tracking-[0.18em] text-[color:var(--ink-mid)] hover:text-[color:var(--ink)]"
          >
            전체 보기 →
          </button>
        </div>

        <SearchBar value={query} onChange={setQuery} />

        {filtered.length === 0 ? (
          <div className="text-center py-8 serif italic text-[13px] text-[color:var(--ink-soft)]">
            "{query}" 와 관련된 이야기를 아직 따라가고 있지 않아요.
          </div>
        ) : (
          <div className="space-y-3">
            {filtered.map((c) => (
              <HomeCardTeaser key={c.id} card={c} onClick={() => setPage("today")} />
            ))}
          </div>
        )}
      </section>
    </div>
  );
}

function HomeCardTeaser({ card, onClick }) {
  return (
    <button
      onClick={onClick}
      className="w-full text-left bg-white border hairline rounded-sm p-5 hover:shadow-md transition-shadow"
      style={{ boxShadow: "var(--card-shadow-soft)" }}
    >
      <div className="flex items-center gap-2 mb-2 flex-wrap">
        <IssueLabel issue={card.issue} />
        <span className="mono text-[10.5px] uppercase tracking-[0.16em] text-[color:var(--ink-mid)]">
          📍 {card.daysTracked}일째
        </span>
        {card.isRealData && (
          <span className="mono text-[9.5px] uppercase tracking-[0.18em] px-1.5 py-0.5 bg-[color:var(--spec-canonical)] text-white rounded-sm font-semibold">
            REAL DATA
          </span>
        )}
      </div>
      <h3 className="serif font-semibold text-[16px] leading-tight mb-2" style={{ letterSpacing: "-0.014em" }}>
        {card.title}
      </h3>
      {card.trail && card.trail.length >= 3 && (
        <div className="flex items-center gap-1.5 flex-wrap mt-3 mono text-[10.5px] tabular-nums">
          {card.trail.slice(0, 4).map((t, i) => {
            const num = (t.actor.match(/\d+%|\d+만/) || [""])[0] || "";
            const src = (t.outlet || t.actor).split(/[\s·]/)[0];
            return (
              <React.Fragment key={i}>
                {i > 0 && <span className="text-[color:var(--ink-faint)]">→</span>}
                <span className="flex items-baseline gap-1">
                  {num && <span className={`font-bold ink-${t.spec}`}>{num}</span>}
                  <span className="text-[color:var(--ink-mid)]">{src}</span>
                </span>
              </React.Fragment>
            );
          })}
        </div>
      )}
    </button>
  );
}

// ============================================================
// FEED PAGE — 카테고리별 카드 묶음
// ============================================================

function FeedPage({ cards, onCorrect }) {
  const [activeIssue, setActiveIssue] = useState("all");
  const issues = useMemo(() => {
    const set = new Set(cards.map((c) => c.issue));
    return ["all", ...Array.from(set)];
  }, [cards]);
  const filtered = activeIssue === "all" ? cards : cards.filter((c) => c.issue === activeIssue);

  const grouped = useMemo(() => {
    const map = {};
    filtered.forEach((c) => {
      if (!map[c.issue]) map[c.issue] = [];
      map[c.issue].push(c);
    });
    return map;
  }, [filtered]);

  return (
    <div className="max-w-2xl mx-auto px-5 py-6">
      <header className="mb-6">
        <div className="mono text-[10.5px] uppercase tracking-[0.22em] text-[color:var(--ink-mid)] mb-2">
          Feed · 카테고리
        </div>
        <h1 className="headline-display text-[26px] md:text-[30px]">
          주제별로 따라가요
        </h1>
      </header>

      <div className="flex flex-wrap gap-2 mb-6">
        {issues.map((iss) => (
          <button
            key={iss}
            onClick={() => setActiveIssue(iss)}
            className={`px-3 py-1.5 border hairline rounded-sm text-[12px] transition-colors ${
              activeIssue === iss
                ? "bg-[color:var(--ink)] text-white border-[color:var(--ink)]"
                : "text-[color:var(--ink-soft)] hover:bg-[color:var(--paper-2)]"
            }`}
          >
            {iss === "all" ? "전체" : (ISSUE_LABELS[iss]?.label || iss)}
          </button>
        ))}
      </div>

      {Object.entries(grouped).map(([issue, group]) => (
        <section key={issue} className="mb-7">
          <div className="flex items-baseline gap-3 mb-3">
            <h2 className="headline-display text-[18px]">
              {ISSUE_LABELS[issue]?.label || issue}
            </h2>
            <span className="mono text-[10.5px] uppercase tracking-[0.16em] text-[color:var(--ink-mid)] tabular-nums">
              {group.length}개 따라가는 중
            </span>
          </div>
          <div className="space-y-3">
            {group.map((c) => (
              <HomeCardTeaser key={c.id} card={c} onClick={() => onCorrect && null} />
            ))}
          </div>
        </section>
      ))}

      {filtered.length === 0 && (
        <div className="text-center py-12 serif italic text-[13px] text-[color:var(--ink-soft)]">
          이 카테고리는 아직 따라가는 이야기가 없어요.
        </div>
      )}
    </div>
  );
}

// ============================================================
// APP
// ============================================================

function App() {
  const [page, setPage] = useState("home");
  const [correctingCard, setCorrectingCard] = useState(null);
  const [showHowWeWork, setShowHowWeWork] = useState(false);
  const [realData, setRealData] = useState({ trend: null, selection: null, loading: true });

  useEffect(() => {
    try {
      const trendEl = document.getElementById("prism-trend-data");
      const selEl = document.getElementById("prism-selection-data");
      if (trendEl && selEl) {
        const trend = JSON.parse(trendEl.textContent);
        const selection = JSON.parse(selEl.textContent);
        setRealData({ trend, selection, loading: false });
      } else {
        setRealData({ trend: null, selection: null, loading: false });
      }
    } catch (e) {
      console.error("Inline data parse failed", e);
      setRealData({ trend: null, selection: null, loading: false });
    }
  }, []);

  const panels = useMemo(() => [
    { id: "hero", title: "Hero", render: () => <HeroCard setPage={setPage} /> },
    ...DAILY_CARDS.map((c, i) => ({
      id: c.id,
      title: `Trend ${c.trendNo}`,
      render: (expanded, toggle, onCorrect) => (
        <TrendCard card={c} onCorrect={onCorrect} />
      ),
    })),
    { id: "weekly", title: "Weekly", render: () => <WeeklyFlowCard /> },
  ], []);

  // 오늘의 이슈 (today) — 카드 5장 + Weekly만, hero 제외
  const todayPanels = useMemo(() => [
    ...DAILY_CARDS.map((c) => ({
      id: c.id,
      title: `Trend ${c.trendNo}`,
      render: (expanded, toggle, onCorrect) => (
        <TrendCard card={c} onCorrect={onCorrect} />
      ),
    })),
    { id: "weekly", title: "Weekly", render: () => <WeeklyFlowCard /> },
  ], []);

  return (
    <RealDataContext.Provider value={realData}>
      <Header page={page} setPage={setPage} />
      {page === "home" && (
        <main className="pb-6">
          <HomePage cards={DAILY_CARDS} setPage={setPage} />
        </main>
      )}
      {page === "today" && (
        <main className="pb-6">
          <Deck panels={todayPanels} onCorrect={setCorrectingCard} />
        </main>
      )}
      {page === "feed" && (
        <main className="pb-6">
          <FeedPage cards={DAILY_CARDS} onCorrect={setCorrectingCard} />
        </main>
      )}
      {showHowWeWork && (
        <div className="fixed inset-0 z-50 bg-black/45 overflow-y-auto" onClick={() => setShowHowWeWork(false)}>
          <div className="min-h-full bg-[color:var(--paper)]" onClick={(e) => e.stopPropagation()}>
            <div className="sticky top-0 bg-[color:var(--paper)]/96 backdrop-blur border-b" style={{ borderColor: "var(--rule)" }}>
              <div className="max-w-2xl mx-auto px-5 h-14 flex items-center justify-between">
                <span className="cap-strong">How We Work</span>
                <button onClick={() => setShowHowWeWork(false)} className="text-[color:var(--ink-faint)] hover:text-[color:var(--ink)] text-[20px] leading-none">✕</button>
              </div>
            </div>
            <HowWeWork />
          </div>
        </div>
      )}
      <Footer onHowWeWork={() => setShowHowWeWork(true)} />
      <CorrectionFormModal card={correctingCard} onClose={() => setCorrectingCard(null)} />
    </RealDataContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
