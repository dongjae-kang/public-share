const formatNumber = (n) => {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(0) + 'K';
  return n.toString();
};

function getFlags(topic) {
  const flags = [];
  if (topic.unverifiablePercent >= 30) flags.push({ label: `원본 불명 ${topic.unverifiablePercent}%`, color: 'rose' });
  if (topic.totalViews >= 1000000) flags.push({ label: '조회수 100만+', color: 'emerald' });
  if (topic.origin === 'unverifiable') flags.push({ label: '출처 없음', color: 'rose' });
  if (Math.abs(topic.biasSpread.conservative - topic.biasSpread.progressive) <= 10) flags.push({ label: '대칭 확산', color: 'slate' });
  if ([2, 5, 10].includes(topic.id)) flags.push({ label: '단기 확산', color: 'amber' });
  return flags;
}

function Sparkline({ data, width = 60, height = 20, color = '#475569' }) {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const points = data.map((v, i) => ({
    x: (i / (data.length - 1)) * (width - 2) + 1,
    y: (height - 2) - ((v - min) / range) * (height - 4) + 1,
  }));
  const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const lastPoint = points[points.length - 1];
  return (
    <svg width={width} height={height} className="inline-block flex-shrink-0" viewBox={`0 0 ${width} ${height}`}>
      <path d={path} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={lastPoint.x} cy={lastPoint.y} r="1.8" fill={color} />
    </svg>
  );
}

function Badge({ label, color = 'slate' }) {

  };
  return (
    <span className={`inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-semibold uppercase tracking-wider border ${colors[color]} whitespace-nowrap`}>
      {label}
    </span>
  );
}

function DiffusionChart({ data }) {
  const [hoverIdx, setHoverIdx] = useState(null);
  const W = 600, H = 220;
  const pad = { top: 15, right: 15, bottom: 30, left: 55 };
  const iw = W - pad.left - pad.right;
  const ih = H - pad.top - pad.bottom;
  const max = Math.max(...data.map(d => d.cumulative));
  const niceMax = Math.ceil(max / 200000) * 200000;
  const points = data.map((d, i) => ({
    x: pad.left + (i / (data.length - 1)) * iw,
    y: pad.top + ih - (d.cumulative / niceMax) * ih,
    label: d.day, value: d.cumulative,
  }));
  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
  const areaPath = `${linePath} L ${points[points.length - 1].x} ${pad.top + ih} L ${points[0].x} ${pad.top + ih} Z`;
  const yTicks = [0, 0.25, 0.5, 0.75, 1];
  const interpretations = [
    { label: '발표일', desc: 'canonical source 14:00 공식 발표. 초기 확산 5천.' },
    { label: '확산 시작', desc: '18개 주요 채널 인용 (+5,600%). 주로 직접 인용 형태.' },
    { label: 'Viral Peak', desc: '시사 채널 Y 업로드로 peak 도달. 51시간 후 = organic 프로파일.' },
    { label: 'Post-peak', desc: '확산 속도 급감. unverifiable 영상 등장 시점.' },
    { label: '안정화', desc: '주간 사이클 성숙. 추가 인용보다 댓글 클러스터 활동.' },
    { label: '주간 마감', desc: '누적 124만 도달. 다음 batch로 이관.' },
  ];
  return (
    <div className="bg-white border border-slate-200 rounded-lg p-5 hover:border-slate-300 transition-colors">
      <div className="flex items-start justify-between mb-4">
        <div>
          <h3 className="font-semibold text-slate-900">확산 곡선</h3>
          <p className="text-xs text-slate-500 mt-0.5">누적 조회수 · 시간축 · canonical source 대비</p>
        </div>
        <div className="text-xs text-slate-400">viral peak: 4/17 오후</div>
      </div>
      <div className="relative">
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ maxHeight: 260 }}>
          <defs>
            <linearGradient id="diffusionGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#475569" stopOpacity="0.28" />
              <stop offset="100%" stopColor="#475569" stopOpacity="0.02" />
            </linearGradient>
          </defs>
          {yTicks.map((frac, i) => {
            const y = pad.top + ih - frac * ih;
            const v = frac * niceMax;
            return (
              <g key={i}>
                <line x1={pad.left} y1={y} x2={pad.left + iw} y2={y} stroke="#e2e8f0" strokeDasharray="3 3" />
                <text x={pad.left - 8} y={y + 4} textAnchor="end" fontSize="10" fill="#64748b">{formatNumber(v)}</text>
              </g>
            );
          })}
          <path d={areaPath} fill="url(#diffusionGrad)" />
          <path d={linePath} fill="none" stroke="#475569" strokeWidth={2} />
          {points.map((p, i) => (
            <g key={i}
              onMouseEnter={() => setHoverIdx(i)}
              onMouseLeave={() => setHoverIdx(null)}
              style={{ cursor: 'pointer' }}
            >
              <rect x={p.x - 22} y={pad.top} width={44} height={ih} fill="transparent" />
              {hoverIdx === i && (
                <line x1={p.x} y1={p.y} x2={p.x} y2={pad.top + ih} stroke="#94a3b8" strokeDasharray="2 2" strokeWidth={1} />
              )}
              <circle cx={p.x} cy={p.y} r={hoverIdx === i ? 6 : 3.5} fill={hoverIdx === i ? '#0f172a' : '#475569'} stroke="#fff" strokeWidth={hoverIdx === i ? 2 : 1.5} style={{ transition: 'all 0.15s' }} />
              <text x={p.x} y={H - 8} textAnchor="middle" fontSize="11" fill={hoverIdx === i ? '#0f172a' : '#64748b'} fontWeight={hoverIdx === i ? 700 : 400} style={{ transition: 'all 0.15s' }}>{p.label}</text>
            </g>
          ))}
        </svg>
        {hoverIdx !== null && (
          <div
            className="absolute p-3.5 bg-slate-900 text-white text-xs rounded-lg shadow-xl min-w-[240px] max-w-[300px] z-20 pointer-events-none"
            style={{
              left: `${(points[hoverIdx].x / W) * 100}%`,
              top: '8px',
              transform: `translateX(${hoverIdx >= points.length - 2 ? 'calc(-100% - 16px)' : hoverIdx <= 1 ? '16px' : '-50%'})`
            }}
          >
            <div className="font-semibold text-slate-100 mb-1.5 flex items-baseline gap-2">
              <span>{points[hoverIdx].label}</span>
              <span className="text-[11px] text-slate-400 font-normal uppercase tracking-wider">{interpretations[hoverIdx].label}</span>
            </div>
            <div className="text-slate-300 space-y-1">
              <div>누적 조회수 <strong className="text-white tabular-nums">{formatNumber(points[hoverIdx].value)}</strong></div>
              {hoverIdx > 0 && (
                <div className="text-[11px] text-slate-400">전일 대비 <span className="text-emerald-400 tabular-nums">+{formatNumber(points[hoverIdx].value - points[hoverIdx - 1].value)}</span></div>
              )}
            </div>
            <div className="mt-2.5 pt-2.5 border-t border-slate-700 text-slate-400 text-[11px] leading-relaxed">
              {interpretations[hoverIdx].desc}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

                  stroke="#fff" strokeWidth={isHovered ? 3 : 2}

                {lines.map((line, idx) => (

        {hoveredNodeData && nodeInfo[hoveredNodeData.type] && (

            style={{
              left: hoveredNodeData.x > 400 ? 'auto' : `${(hoveredNodeData.x / 800) * 100 + 2}%`,
              right: hoveredNodeData.x > 400 ? `${((800 - hoveredNodeData.x) / 800) * 100 + 2}%` : 'auto',

            }}

            <div className="font-semibold text-slate-100 mb-1">{hoveredNodeData.label.split('\n').join(' · ')}</div>
            <div className={`text-[11px] uppercase tracking-wider mb-2 ${nodeInfo[hoveredNodeData.type].color}`}>{nodeInfo[hoveredNodeData.type].typeName}</div>

            </div>

function CarouselView({ panels, activeIdx, setActiveIdx }) {
  const count = panels.length;

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowLeft') setActiveIdx((prev) => (prev - 1 + count) % count);
      if (e.key === 'ArrowRight') setActiveIdx((prev) => (prev + 1) % count);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [count, setActiveIdx]);

  return (
    <div>
      <div
        className="relative"
        style={{ height: 780, perspective: '1800px' }}
      >
        <div
          className="absolute inset-0"
          style={{ transformStyle: 'preserve-3d' }}
        >
          {panels.map((panel, i) => {
            const angleStep = 360 / count;
            let angleDiff = (i - activeIdx) * angleStep;
            while (angleDiff > 180) angleDiff -= 360;
            while (angleDiff < -180) angleDiff += 360;

            const theta = (angleDiff * Math.PI) / 180;
            const R = 420;
            const x = R * Math.sin(theta);
            const z = R * Math.cos(theta) - R;
            const rotY = -angleDiff;

            const absAngle = Math.abs(angleDiff);
            const isActive = absAngle < 1;
            const isAdjacent = Math.abs(absAngle - angleStep) < 1;

            const opacity = isActive ? 1 : isAdjacent ? 0.38 : 0;
            const blurPx = isActive ? 0 : 2;
            const zIndex = 100 - Math.round(absAngle);

            return (
              <div
                key={panel.id}
                className={`absolute top-1/2 left-1/2 transition-all duration-500 ease-out ${isAdjacent && !isActive ? 'cursor-pointer' : ''}`}
                style={{
                  transform: `translate(-50%, -50%) translate3d(${x}px, 0, ${z}px) rotateY(${rotY}deg)`,
                  transformStyle: 'preserve-3d',
                  backfaceVisibility: 'hidden',
                  opacity,
                  filter: `blur(${blurPx}px)`,
                  zIndex,
                  width: 720,
                  maxWidth: '92vw',
                  minHeight: 680,
                  display: 'flex',
                  alignItems: 'center',
                  pointerEvents: isActive ? 'auto' : isAdjacent ? 'auto' : 'none',
                }}
                onClick={() => !isActive && isAdjacent && setActiveIdx(i)}
              >
                <div style={{ width: '100%' }}>
                  {panel.render()}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="flex items-center justify-center gap-3 mt-8 flex-wrap">
        <button
          onClick={() => setActiveIdx((activeIdx - 1 + count) % count)}
          className="w-11 h-11 rounded-full border border-slate-300 bg-white hover:border-slate-500 hover:bg-slate-50 transition-all flex items-center justify-center text-slate-700 text-lg shrink-0"
          aria-label="Previous"
        >←</button>

        <div className="flex gap-2 flex-wrap justify-center">
          {panels.map((p, i) => (
            <button
              key={p.id}
              onClick={() => setActiveIdx(i)}
              className={`px-3.5 py-1.5 text-xs font-medium rounded-full transition-all ${
                i === activeIdx
                  ? 'bg-slate-900 text-white'
                  : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
              }`}
            >{p.title}</button>
          ))}
        </div>

        <button
          onClick={() => setActiveIdx((activeIdx + 1) % count)}
          className="w-11 h-11 rounded-full border border-slate-300 bg-white hover:border-slate-500 hover:bg-slate-50 transition-all flex items-center justify-center text-slate-700 text-lg shrink-0"
          aria-label="Next"
        >→</button>
      </div>

      <div className="text-center text-[11px] text-slate-400 mt-4 uppercase tracking-wider">
        양옆 패널 클릭 · 좌우 화살표 키 · 하단 탭으로 이동
      </div>
    </div>
  );
}

function DrillDownView({ topicId, onBack }) {
  const topic = TOPICS.find(t => t.id === topicId);
  const detail = TOPIC_DETAIL_1;
  const [viewMode, setViewMode] = useState('carousel');
  const [carouselIdx, setCarouselIdx] = useState(0);

  if (!topic) return null;

  const panels = [
    { id: 'diffusion', title: '확산 곡선', render: () => <DiffusionChart data={detail.diffusion} /> },
    { id: 'bias', title: '편향 분포', render: () => <BiasCard spread={topic.biasSpread} originLabel={topic.origin} /> },
    { id: 'provenance', title: '원본 추적', render: () => <ProvenanceTrace items={detail.provenance} /> },
    { id: 'comments', title: '댓글·봇 탐지', render: () => <CommentBreakdown data={detail.comments} botPercent={detail.botPercent} /> },
    { id: 'kg', title: 'Knowledge Graph', render: () => <MiniKG data={detail.kg} /> },
  ];

  return (
    <div className="max-w-6xl mx-auto px-6 py-8">
      <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
        <button onClick={onBack} className="flex items-center gap-2 text-sm text-slate-600 hover:text-slate-900 transition-colors">
          <span>←</span><span>목록으로 돌아가기</span>
        </button>
        <div className="flex items-center gap-1 bg-slate-100 rounded-lg p-1">
          <button
            onClick={() => setViewMode('carousel')}
            className={`px-4 py-2 text-xs font-semibold rounded transition-all ${
              viewMode === 'carousel' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-500 hover:text-slate-700'
            }`}
          >Spotlight</button>
          <button
            onClick={() => setViewMode('grid')}
            className={`px-4 py-2 text-xs font-semibold rounded transition-all ${
              viewMode === 'grid' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-500 hover:text-slate-700'
            }`}
          >Overview</button>
        </div>
      </div>
      <div className="bg-white border border-slate-200 rounded-lg p-6 mb-6">
        <div className="flex items-start justify-between mb-3 gap-3 flex-wrap">
          <div>
            <div className="text-xs text-slate-500 mb-1">{topic.date} · origin: {topic.origin}</div>
            <h2 className="text-2xl font-semibold text-slate-900">{topic.title}</h2>
          </div>
          <div className="mock-badge px-2 py-1 rounded text-xs font-semibold text-amber-900 border border-amber-300">MOCK</div>
        </div>
        <p className="text-slate-700 mb-4">{topic.summary}</p>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 pt-4 border-t border-slate-100">
          <div><div className="text-xs text-slate-500 mb-0.5">총 누적 조회수</div><div className="text-lg font-semibold text-slate-900 tabular-nums">{formatNumber(topic.totalViews)}</div></div>
          <div><div className="text-xs text-slate-500 mb-0.5">파생 영상 수</div><div className="text-lg font-semibold text-slate-900 tabular-nums">{topic.videoCount}</div></div>
          <div><div className="text-xs text-slate-500 mb-0.5">원본 불명</div><div className="text-lg font-semibold text-slate-900 tabular-nums">{topic.unverifiablePercent}%</div></div>
          <div><div className="text-xs text-slate-500 mb-0.5">Viral peak</div><div className="text-lg font-semibold text-slate-900">{topic.viralPeak}</div></div>
        </div>
      </div>
      {viewMode === 'grid' ? (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
          <DiffusionChart data={detail.diffusion} />
          <BiasCard spread={topic.biasSpread} originLabel={topic.origin} />
          <ProvenanceTrace items={detail.provenance} />
          <CommentBreakdown data={detail.comments} botPercent={detail.botPercent} />
          <MiniKG data={detail.kg} />
        </div>
      ) : (
        <CarouselView panels={panels} activeIdx={carouselIdx} setActiveIdx={setCarouselIdx} />
      )}
    </div>
  );
}

  return (
